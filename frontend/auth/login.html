<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CCMS</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <!-- Logo and Branding -->
    <div class="login-logo">
      <!-- HB Logo with blue background -->
      <div style="width:80px;height:80px;background:#2563EB;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <span style="font-size:32px;font-weight:700;color:white;">HB</span>
      </div>
      <h1>HealthHub Bridge</h1>
      <p>Community Clinic Management System</p>
    </div>

    <!-- Error Message Display -->
    <div id="login-error" style="display:none;background:#FEE2E2;color:#B91C1C;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:16px;"></div>

    <!-- Username Input -->
    <div class="form-group">
      <label class="form-label">Username <span class="required">*</span></label>
      <input type="text" id="username" class="form-control" placeholder="e.g. amina.lado" autofocus>
      <div class="form-error" id="username-error">Username is required</div>
    </div>

    <!-- Password Input with Show/Hide Toggle -->
    <div class="form-group">
      <label class="form-label">Password <span class="required">*</span></label>
      <div style="position:relative">
        <input type="password" id="password" class="form-control" placeholder="Enter your password" style="padding-right:40px">
        <button onclick="togglePassword()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;" id="toggle-pwd">Show</button>
      </div>
      <div class="form-error" id="password-error">Password is required</div>
    </div>

    <!-- Remember Me and Forgot Password -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
        <input type="checkbox" id="remember"> Remember me
      </label>
      <a href="#" style="font-size:13px;color:var(--primary);text-decoration:none;">Forgot password?</a>
    </div>

    <!-- Login Button -->
    <button class="btn btn-primary" id="login-btn" onclick="handleLogin()" style="width:100%;justify-content:center;padding:10px;">Login</button>
  </div>
</div>

<script src="/assets/js/utils.js"></script>
<script src="/auth/login.js"></script>

</body>
</html>
