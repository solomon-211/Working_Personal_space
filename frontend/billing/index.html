<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing — CCMS</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="billing.css" />
</head>
<body>

<!-- Full-page spinner shown while invoices are loading -->
<div id="global-spinner" class="global-spinner-overlay">
  <span class="spinner spinner-dark spinner-lg"></span>
</div>

<!-- Create invoice modal — patient dropdown and service rows are populated by billing.js -->
<div class="modal-overlay" id="create-invoice-modal">
  <div class="modal modal-invoice">
    <div class="modal-header">
      <h3 class="modal-title">Create Invoice</h3>
      <button class="modal-close" onclick="hideModal('create-invoice-modal')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Patient <span class="required">*</span></label>
      <select id="invoice-patient-select" class="form-control" title="Select patient">
        <option value="">Select Patient</option>
      </select>
    </div>
    <!-- Service line items — addServiceRow() appends rows dynamically -->
    <div class="form-group">
      <div class="service-label-row">
        <label class="form-label service-label">Services</label>
        <button type="button" class="btn btn-outline btn-sm" onclick="addServiceRow()">+ Add Service</button>
      </div>
      <table class="service-table">
        <thead>
          <tr class="service-table-header">
            <th class="col-service">Service</th>
            <th class="col-qty">Qty</th>
            <th class="col-price">Price (SSP)</th>
            <th class="col-remove"></th>
          </tr>
        </thead>
        <tbody id="services-tbody-new"></tbody>
      </table>
    </div>
    <!-- Running total updates as rows are added or quantities change -->
    <div class="invoice-total-preview">
      Total: <span id="invoice-total-preview">0 SSP</span>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="hideModal('create-invoice-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitCreateInvoice()">Create Invoice</button>
    </div>
  </div>
</div>

<!-- Record payment modal -->
<div class="modal-overlay" id="payment-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Record Payment</h3>
      <button class="modal-close" onclick="hideModal('payment-modal')">×</button>
    </div>
    <input type="hidden" id="pay-invoice-id">
    <input type="hidden" id="pay-amount-due">

    <div class="form-group">
      <label class="form-label">Amount (SSP) <span class="required">*</span></label>
      <input type="number" id="pay-amount" class="form-control" min="0" step="0.01" placeholder="0.00">
      <small id="pay-remaining-hint" style="color:var(--text-muted);font-size:11px;"></small>
    </div>

    <div class="form-group">
      <label class="form-label">Payment Method</label>
      <select id="pay-method" class="form-control" title="Payment method" onchange="onMethodChange()">
        <option value="Cash">Cash</option>
        <option value="Card">Card</option>
        <option value="Mobile">Mobile</option>
        <option value="Insurance">Insurance</option>
      </select>
    </div>

    <!-- Cash fields -->
    <div id="fields-Cash">
      <div class="form-group">
        <label class="form-label">Reference No.</label>
        <input type="text" id="cash-ref" class="form-control" placeholder="Optional">
      </div>
    </div>

    <!-- Card fields -->
    <div id="fields-Card" style="display:none;">
      <div class="form-group">
        <label class="form-label">Patient Email <span class="required">*</span></label>
        <input type="email" id="card-email" class="form-control" placeholder="patient@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Card Network</label>
        <input type="text" id="card-network" class="form-control" placeholder="Visa, Mastercard...">
      </div>
      <div class="form-group">
        <label class="form-label">Card Last 4 Digits</label>
        <input type="text" id="card-last4" class="form-control" maxlength="4" placeholder="1234">
      </div>
      <div class="form-group">
        <label class="form-label">Authorization Code</label>
        <input type="text" id="card-auth" class="form-control" placeholder="Bank authorization code">
      </div>
    </div>

    <!-- Mobile fields -->
    <div id="fields-Mobile" style="display:none;">
      <div class="form-group">
        <label class="form-label">Patient Email <span class="required">*</span></label>
        <input type="email" id="mobile-email" class="form-control" placeholder="patient@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Mobile Provider</label>
        <input type="text" id="mobile-provider" class="form-control" placeholder="e.g. MTN, Zain">
      </div>
      <div class="form-group">
        <label class="form-label">Mobile Number</label>
        <input type="text" id="mobile-number" class="form-control" placeholder="+211...">
      </div>
      <div class="form-group">
        <label class="form-label">Transaction ID</label>
        <input type="text" id="mobile-txn" class="form-control" placeholder="Required if no reference number">
      </div>
    </div>

    <!-- Insurance fields -->
    <div id="fields-Insurance" style="display:none;">
      <div class="form-group">
        <label class="form-label">Reference No.</label>
        <input type="text" id="ins-ref" class="form-control" placeholder="Optional">
      </div>
      <div class="form-group">
        <label class="form-label">Insurer Name</label>
        <input type="text" id="ins-name" class="form-control" placeholder="Insurance provider">
      </div>
      <div class="form-group">
        <label class="form-label">Claim Number</label>
        <input type="text" id="ins-claim" class="form-control" placeholder="Required if no reference number">
      </div>
      <div class="form-group">
        <label class="form-label">Authorization Code</label>
        <input type="text" id="ins-auth" class="form-control" placeholder="Optional pre-auth code">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="hideModal('payment-modal')">Cancel</button>
      <button class="btn btn-primary" id="pay-submit-btn" onclick="submitPayment()">Record Payment</button>
    </div>
  </div>
</div>

<div class="layout">
  <div id="header-slot"></div>
  <div id="sidebar-slot"></div>

  <main class="main">

    <div class="page-header">
      <div>
        <h1 class="page-title">Billing</h1>
        <p class="page-subtitle">Track invoices, balances, and payment status</p>
      </div>
      <button class="btn btn-primary" onclick="openCreateInvoice()">+ Create Invoice</button>
    </div>

    <!-- Filter bar — billing.js listens for input changes and re-renders the table -->
    <div class="filter-bar filter-bar-billing">
      <input type="text" id="filter-patient" class="form-control filter-patient-input" placeholder="Search by patient name or clinic number...">
      <select id="filter-status" class="form-control filter-status-select" title="Filter by status">
        <option value="">All Statuses</option>
        <option value="Unpaid">Unpaid</option>
        <option value="Partial">Partial</option>
        <option value="Paid">Paid</option>
      </select>
    </div>

    <!-- Invoice table — rows are injected by renderInvoices() in billing.js -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Invoice #</th>
            <th>Patient</th>
            <th>Date</th>
            <th>Total</th>
            <th>Amount Due</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="invoices-list">
          <tr><td colspan="7"><div class="empty-state"><div class="empty-state-text">Loading invoices...</div></div></td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="billing.js"></script>
</body>
</html>
