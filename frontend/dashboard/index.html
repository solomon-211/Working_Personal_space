<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — CCMS</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<!-- Full-page spinner shown while data is loading -->
<div id="global-spinner" class="global-spinner-overlay">
  <span class="spinner spinner-dark spinner-lg"></span>
</div>

<!-- Main layout wrapper — sidebar and header are injected by JS -->
<div class="layout">

  <!-- These slots get replaced by renderHeader() and renderSidebar() in utils.js -->
  <div id="header-slot"></div>
  <div id="sidebar-slot"></div>

  <main class="main">

    <!-- Page title row — admin users also get a quick link to Reports -->
    <div class="page-header">
      <h1 class="page-title" id="dash-title">Dashboard</h1>
      <!-- Only visible to admins via applyRoleVisibility() -->
      <div data-role="admin">
        <a href="/reports/index.html" class="btn btn-outline btn-sm">Reports</a>
      </div>
    </div>

    <!-- Summary stat cards — revenue and outstanding are hidden for doctors -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-card-value" id="stat-patients">—</div>
        <div class="stat-card-label">Total Patients</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-value" id="stat-appointments">—</div>
        <div class="stat-card-label">Upcoming Appointments</div>
      </div>
      <!-- These two cards are hidden for doctors via data-role -->
      <div class="stat-card" data-role="admin,receptionist">
        <div class="stat-card-value" id="stat-revenue">—</div>
        <div class="stat-card-label">Total Revenue</div>
      </div>
      <div class="stat-card" data-role="admin,receptionist">
        <div class="stat-card-value" id="stat-pending">—</div>
        <div class="stat-card-label">Outstanding Balance</div>
      </div>
    </div>

    <!-- Payment overview bar chart / breakdown — rendered by dashboard.js -->
    <div class="card" style="margin-bottom:24px;">
      <div class="card-title">Payment Overview</div>
      <div id="payment-overview">
        <div class="empty-state"><div class="empty-state-text">Loading...</div></div>
      </div>
    </div>

    <!-- Two-column section: upcoming appointments on the left, recent patients on the right -->
    <div class="dashboard-main-grid">

      <!-- Scheduled appointments list — populated by dashboard.js -->
      <div class="card">
        <div class="card-title">Scheduled Appointments</div>
        <div id="today-appointments">
          <div class="empty-state">
            <div class="empty-state-text">Loading...</div>
          </div>
        </div>
        <div class="section-action">
          <a href="/appointments/index.html" class="btn btn-outline btn-sm" data-role="admin,receptionist">
            View All
          </a>
        </div>
      </div>

      <!-- Recent patients list — populated by dashboard.js -->
      <div class="card">
        <div class="card-title" id="right-panel-title">Recent Patients</div>
        <div id="recent-patients">
          <div class="empty-state">
            <div class="empty-state-text">Loading...</div>
          </div>
        </div>
        <div class="section-action">
          <a href="/patients/register.html" class="btn btn-primary btn-sm" data-role="admin,receptionist">
            + Register Patient
          </a>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="/assets/js/utils.js"></script>
<script src="/dashboard/dashboard.js"></script>

</body>
</html>
