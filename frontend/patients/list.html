<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patients - CCMS</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    /* ── Page header: title on the left, action button on the right ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .page-heading {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }

    .page-subtitle {
      margin: 0;
      font-size: 13px;
      color: var(--text-light);
    }

    .page-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    /* ── Search bar row above the table ── */
    .page-controls {
      display: flex;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      align-items: center;
    }

    /* Search input with icon on the left */
    .search-box {
      position: relative;
      flex: 1;
      max-width: 420px;
    }

    .search-box-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 15px;
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      padding: 9px 36px 9px 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      background: white;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .search-box input::placeholder { color: var(--text-muted); }

    /* Clear button appears on the right when there is text */
    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      display: none;
      padding: 2px;
    }

    .search-clear:hover { color: var(--text); }

    /* ── Patients table card ── */
    .table-container {
      background: white;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .table-header {
      padding: var(--spacing-lg);
      border-bottom: 1px solid var(--border);
      background: var(--bg-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* "Showing X–Y of Z patients" text */
    .table-info {
      font-size: 13px;
      color: var(--text-light);
    }

    table {
      width: 100%;
      font-size: 13px;
    }

    thead th {
      padding: var(--spacing-md);
      text-align: left;
      font-weight: 600;
      color: var(--text);
      background: var(--bg-light);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Utility class to hide elements */
    .is-hidden {
      display: none !important;
    }

    thead th:hover {
      background: #e2e8f0;
    }

    tbody td {
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--border);
    }

    tbody tr:hover {
      background: var(--bg-light);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    /* View / Edit buttons in each row */
    .action-buttons {
      display: flex;
      gap: var(--spacing-sm);
    }

    .action-buttons button {
      padding: 4px 8px;
      font-size: 11px;
    }

    /* Shown when no patients match the search */
    .empty-state {
      text-align: center;
      padding: var(--spacing-2xl);
      color: var(--text-light);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: var(--spacing-lg);
    }

    .empty-state-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: var(--spacing-sm);
      color: var(--text);
    }

    .empty-state-text {
      margin-bottom: var(--spacing-lg);
    }

    /* ── Pagination footer ── */
    .pagination-footer {
      padding: var(--spacing-lg);
      border-top: 1px solid var(--border);
      background: var(--bg-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Shown while the API call is in progress */
    .patients-loading {
      text-align: center;
      padding: var(--spacing-2xl);
      color: var(--text-light);
    }

    /* ── Responsive: stack header and controls on small screens ── */
    @media (max-width: 768px) {
      .page-header {
        flex-direction: column;
        align-items: stretch;
      }

      .page-actions {
        width: 100%;
      }

      .page-actions .btn {
        width: 100%;
      }

      .page-controls {
        flex-direction: column;
        align-items: flex-start;
      }

      .search-input {
        max-width: none;
      }

      table {
        font-size: 12px;
      }

      td, th {
        padding: var(--spacing-sm) !important;
      }

      .action-buttons {
        flex-direction: column;
      }

      .action-buttons button {
        display: block;
        width: 100%;
      }
    }
  </style>
</head>
<body>

<!-- Full-page loading spinner shown during API calls -->
<div id="global-spinner" class="global-spinner-overlay">
  <span class="spinner spinner-dark spinner-lg"></span>
</div>

<div class="layout">
  <!-- Header and sidebar injected by JavaScript -->
  <div id="header-slot"></div>
  <div id="sidebar-slot"></div>

  <main class="main">
    <div class="page-header">
      <div class="page-heading">
        <h1 class="page-title">Patients</h1>
        <p class="page-subtitle">View records, search quickly, and manage patient registration</p>
      </div>
      <!-- Only admins and receptionists see the Register button (hidden via JS below) -->
      <div class="page-actions">
        <button class="btn btn-primary" id="register-btn" onclick="location.href = '/patients/register.html'">
          Register New Patient
        </button>
      </div>
    </div>

    <!-- Search bar with a clear button -->
    <div class="page-controls">
      <div class="search-box">
        <span class="search-box-icon">&#128269;</span>
        <input
          type="text"
          id="search-input"
          placeholder="Search by name, clinic number, or phone..."
        />
        <button class="search-clear" id="search-clear" onclick="clearSearch()">Clear</button>
      </div>
    </div>

    <!-- Table card with header info and pagination footer -->
    <div class="table-container">
      <div class="table-header">
        <span class="table-info" id="table-info"></span>
      </div>

      <!-- Table is rendered here by renderTable() -->
      <div id="patients-list">
        <div class="patients-loading">Loading patients...</div>
      </div>

      <!-- Pagination controls — hidden when there is only one page -->
      <div class="pagination-footer is-hidden" id="pagination-footer">
        <span class="pagination-info" id="pagination-info"></span>
        <div class="pagination">
          <button class="pagination-btn" id="prev-btn" onclick="previousPage()">← Previous</button>
          <button class="pagination-btn" id="next-btn" onclick="nextPage()">Next →</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../assets/js/utils.js"></script>
<script>
  // Redirect to login if not authenticated; restrict to allowed roles
  authGuard();
  checkRole(['receptionist', 'admin', 'doctor']) || (location.href = '/dashboard/index.html');

  // Inject shared header and sidebar, then apply role-based visibility
  document.getElementById('header-slot').outerHTML = renderHeader();
  document.getElementById('sidebar-slot').outerHTML = renderSidebar('patients');
  applyRoleVisibility();

  const currentRole = sessionStorage.getItem('role') || 'Guest';

  // State: full list, filtered list, and current page
  let allPatients = [];
  let filteredPatients = [];
  let currentPage = 1;
  const perPage = 10;

  // Fetch patients from the API, optionally filtered by a search query
  async function loadPatients(searchQuery = '') {
    const container = document.getElementById('patients-list');

    try {
      let endpoint = '/api/patients';
      if (searchQuery) {
        endpoint += `?search=${encodeURIComponent(searchQuery)}`;
      }

      const response = await apiFetch(endpoint);
      allPatients = response.patients || [];
      filteredPatients = allPatients;
      currentPage = 1;

      renderTable();
    } catch (error) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon"><span class="icon-error"></span></div>
          <div class="empty-state-title">Failed to Load Patients</div>
          <div class="empty-state-text">${error.message}</div>
          <button class="btn btn-primary" onclick="loadPatients()">Retry</button>
        </div>
      `;
    }
  }

  // Build and inject the patients table HTML for the current page
  function renderTable() {
    const container = document.getElementById('patients-list');

    // Show empty state if no results
    if (!filteredPatients.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon"><span class="icon-patients"></span></div>
          <div class="empty-state-title">No Patients Found</div>
          <div class="empty-state-text">Try a different search or register a new patient.</div>
          <button class="btn btn-primary" onclick="location.href = '/patients/register.html'">
            Register Patient
          </button>
        </div>
      `;
      document.getElementById('pagination-footer').style.display = 'none';
      return;
    }

    const paginated = paginate(filteredPatients, currentPage, perPage);
    const start = (currentPage - 1) * perPage + 1;
    const end = Math.min(currentPage * perPage, filteredPatients.length);

    document.getElementById('table-info').textContent = `Showing ${start}–${end} of ${filteredPatients.length} patients`;

    // Build table HTML — column headers are clickable for sorting
    let html = `
      <table>
        <thead>
          <tr>
            <th onclick="sortTable('clinic_number')">Clinic No.</th>
            <th onclick="sortTable('first_name')">Full Name</th>
            <th onclick="sortTable('date_of_birth')">Date of Birth</th>
            <th>Gender</th>
            <th>Phone</th>
            <th>Insurance</th>
            <th>Registered</th>
            <th style="text-align: center;">Actions</th>
          </tr>
        </thead>
        <tbody>
    `;

    paginated.items.forEach(patient => {
      const name = `${patient.first_name} ${patient.last_name}`;
      const dob = formatDate(patient.date_of_birth);
      const registered = formatDate(patient.registered_at || patient.created_at);
      const patientId = patient.patient_id || patient.id;

      html += `
        <tr>
          <td><strong>${patient.clinic_number}</strong></td>
          <td>${name}</td>
          <td>${dob}</td>
          <td>${patient.gender || '—'}</td>
          <td>${patient.phone || '—'}</td>
          <td>${patient.insurance_provider || '—'}</td>
          <td>${registered}</td>
          <td>
            <div class="action-buttons">
              <button class="btn btn-small btn-primary" onclick="viewProfile('${patientId}')">View</button>
              ${['admin','receptionist'].includes(currentRole) ? `<button class="btn btn-small btn-secondary" onclick="editPatient('${patientId}')">Edit</button>` : ''}
            </div>
          </td>
        </tr>
      `;
    });

    html += `
      </tbody>
      </table>
    `;

    container.innerHTML = html;

    // Show pagination controls only when there is more than one page
    if (paginated.totalPages > 1) {
      document.getElementById('pagination-footer').style.display = 'flex';
      document.getElementById('pagination-info').textContent = `Page ${paginated.currentPage} of ${paginated.totalPages}`;
      document.getElementById('prev-btn').disabled = currentPage === 1;
      document.getElementById('next-btn').disabled = currentPage === paginated.totalPages;
    } else {
      document.getElementById('pagination-footer').style.display = 'none';
    }
  }

  function previousPage() {
    if (currentPage > 1) {
      currentPage--;
      renderTable();
      window.scrollTo(0, 0);
    }
  }

  function nextPage() {
    const totalPages = Math.ceil(filteredPatients.length / perPage);
    if (currentPage < totalPages) {
      currentPage++;
      renderTable();
      window.scrollTo(0, 0);
    }
  }

  function viewProfile(patientId) {
    location.href = `/patients/profile.html?id=${patientId}`;
  }

  function editPatient(patientId) {
    // Edit feature is not yet implemented
    showToast('Edit feature coming soon', 'info');
  }

  // Sort the filtered list by a column and re-render from page 1
  function sortTable(column) {
    filteredPatients.sort((a, b) => {
      let aVal = a[column] || '';
      let bVal = b[column] || '';

      if (typeof aVal === 'string') {
        return aVal.localeCompare(bVal);
      }
      return aVal - bVal;
    });

    currentPage = 1;
    renderTable();
  }

  // Debounced search: fires 300 ms after the user stops typing
  const debouncedSearch = debounce(async (query) => {
    if (query.length > 0) {
      allPatients = [];
      filteredPatients = [];
      renderTable();
      loadPatients(query);
    } else {
      loadPatients();
    }
  }, 300);

  // Show/hide the clear button and trigger the debounced search
  document.getElementById('search-input').addEventListener('input', (e) => {
    const val = e.target.value;
    document.getElementById('search-clear').style.display = val ? 'block' : 'none';
    debouncedSearch(val);
  });

  function clearSearch() {
    const input = document.getElementById('search-input');
    input.value = '';
    document.getElementById('search-clear').style.display = 'none';
    input.focus();
    loadPatients();
  }

  // Hide the Register button for roles that cannot register patients
  const registerBtn = document.getElementById('register-btn');
  if (registerBtn && !['admin', 'receptionist'].includes(currentRole)) {
    registerBtn.style.display = 'none';
  }

  // Load the patient list on page load
  loadPatients();
</script>
</body>
</html>
